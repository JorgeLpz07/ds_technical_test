version: '3.8'

# Red compartida para comunicación entre contenedores
networks:
  etl_network:
    driver: bridge

# Volúmenes persistentes
volumes:
  etl_db_data:
  airflow_db_data:
  airflow_logs:

# Configuración base compartida para los servicios de Airflow
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    
    # Credenciales para acceder a la BD del proyecto
    DDB_HOST: etl-db
    DDB_USER: etl_user
    DDB_PASSWORD: etl_password
    DDB_PORT: 5432
    DDB_SCHEMA: etl_db
    
    # Conexión por defecto para PostgresOperator en Airflow
    AIRFLOW_CONN_POSTGRES_DEFAULT: 'postgres://etl_user:etl_password@etl-db:5432/etl_db'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./src:/opt/airflow/src
    - ./schemas:/opt/airflow/schemas
    - airflow_logs:/opt/airflow/logs
  networks:
    - etl_network
  depends_on:
    airflow-db:
      condition: service_healthy
    etl-db:
      condition: service_healthy

services:
  # Base de datos principal (Proyecto ETL)
  etl-db:
    image: postgres:16
    container_name: etl_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
      POSTGRES_DB: etl_db
    ports:
      - "5454:5432"
    volumes:
      - etl_db_data:/var/lib/postgresql/data
    networks:
      - etl_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "etl_user", "-d", "etl_db"]
      interval: 10s
      retries: 5
      start_period: 5s

  # Base de datos interna de Airflow (Metadatos)
  airflow-db:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - etl_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # Inicializador de Airflow (se ejecuta solo una vez al levantar el stack)
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin
    restart: on-failure

  # Servidor web de Airflow (UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8085:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Programador de Airflow (Ejecutor de DAGs)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
